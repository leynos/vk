---
# yamllint disable rule:line-length
name: Release Binary

'on':
  push:
    tags:
      - 'v*.*.*'

env:
  REPO_NAME: ${{ github.event.repository.name }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v5
      - name: Setup Python 3.11
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Verify tag matches Cargo.toml
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          export CARGO_TOML_PATH="${CARGO_TOML_PATH:-Cargo.toml}"
          python_script="import os, pathlib, tomllib; print(tomllib.loads(pathlib.Path(os.environ['CARGO_TOML_PATH']).read_text(encoding='utf-8'))['package']['version'])"
          cargo_version="$(echo "${python_script}" | "${{ steps.setup-python.outputs.python-path }}")"
          if [ -z "${cargo_version:-}" ]; then
            echo "::error title=Cargo.toml parse failure::Could not read package.version from ${toml_path}. Ensure Python ≥3.11 (tomllib available) and that the manifest contains [package], or set CARGO_TOML_PATH to the crate's Cargo.toml."
            exit 1
          fi
          if [ "$tag" != "$cargo_version" ]; then
            echo "::error title=Tag/Cargo.toml mismatch::Tag version $tag does not match Cargo.toml version $cargo_version"
            exit 1
          fi
          echo "Release tag $tag matches Cargo.toml version."
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@69f9c29d18a28b6bdf4b02dcd743ef416817ba18
      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Install AArch64 linker
        if: ${{ matrix.target == 'aarch64-unknown-linux-gnu' }}
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-
            ${{ runner.os }}-cargo-
      - name: Build release binary
        if: ${{ matrix.target != 'aarch64-unknown-linux-gnu' }}
        run: cargo build --locked --release --target ${{ matrix.target }} --bin ${{ env.REPO_NAME }}
      - name: Build release binary
        if: ${{ matrix.target == 'aarch64-unknown-linux-gnu' }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --locked --release --target ${{ matrix.target }} --bin ${{ env.REPO_NAME }}
      - name: Package release artifact
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          archive_dir="${REPO_NAME}-${TARGET}-v${version}"
          archive_name="${archive_dir}.tgz"
          mkdir -p dist/"${archive_dir}"
          install -m 0755 "target/${TARGET}/release/${REPO_NAME}" \
            "dist/${archive_dir}/${REPO_NAME}"
          tar -C dist -czf "${archive_name}" "${archive_dir}"
      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.REPO_NAME }}-${{ matrix.target }}
          path: ${{ env.REPO_NAME }}-${{ matrix.target }}-${{ github.ref_name }}.tgz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - id: download
        uses: actions/download-artifact@v5
        with:
          path: release-artifacts
      #- uses: softprops/action-gh-release@v2
      #  with:
      #    tag_name: ${{ github.ref_name }}
      #    generate_release_notes: true
      #    fail_on_unmatched_files: true
      #    files: ${{ steps.download.outputs.download-path }}/${{ env.REPO_NAME }}
      - name: Create or update release
        run: |
          set -euo pipefail
          if ! gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release create "${{ github.ref_name }}" --verify-tag --generate-notes
          fi
          mapfile -d '' assets < <(find "${{ steps.download.outputs.download-path }}" -type f -name '*.tgz' -print0)
          gh release upload --clobber "${{ github.ref_name }}" "${assets[@]}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
